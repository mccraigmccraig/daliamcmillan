name: Astro Upgrade

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    name: Upgrade Astro dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Run Astro upgrade
        run: bun x @astrojs/upgrade

      - name: Refresh lockfile
        run: bun install

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- package.json bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Astro upgrades detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Astro upgrades detected."
          fi

      - name: Verify build
        if: steps.changes.outputs.changed == 'true'
        run: bun run build

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/astro-upgrade
          delete-branch: true
          commit-message: "chore: upgrade Astro dependencies"
          title: "chore: weekly Astro upgrade"
          body: |
            Automated weekly run of `bun x @astrojs/upgrade`.

            Astro (and related `@astrojs/*`) packages were updated. The build passed in CI.
            Review the dependency changes below and merge if everything looks good.
          labels: dependencies
